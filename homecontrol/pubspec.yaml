name: homecontrol
description: "HomeControl - Smart Home Manager"
publish_to: 'none'

version: 0.0.1+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.0.0

  # HTTP
  dio: ^5.7.0

  # Logging
  logger: ^2.4.0

  # Storage
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # File picking
  file_picker: ^8.1.2

  # Image caching
  cached_network_image: ^3.4.1

  # Permissions
  permission_handler: ^11.3.1

  # Open files
  open_filex: ^4.5.0

  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
